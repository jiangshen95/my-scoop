name: Excavator

on:
  workflow_dispatch:
  schedule:
    - cron: '20 */4 * * *'

jobs:
  excavate:
    name: Excavate
    runs-on: windows-latest
    permissions:
      contents: write
    # 添加系统级环境变量，强制所有 action 使用 Node.js 24 运行以消除警告
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      # 升级到 v6 版本，原生支持 Node.js 24
      - uses: actions/checkout@v6
      - name: Excavator
        uses: ScoopInstaller/GithubActions@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SKIP_UPDATED: '1'
